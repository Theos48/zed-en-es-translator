version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Mexico_City
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps

  - package-ecosystem: cargo
    directory: "/zed-extension"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Mexico_City
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Mexico_City
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
