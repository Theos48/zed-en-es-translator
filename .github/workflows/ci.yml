name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Rust quality and security
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check retained repository boundary
        run: make test-repository-boundary

      - name: Check formatting
        run: make fmt

      - name: Run Clippy
        run: make clippy

      - name: Run tests
        run: make test

      - name: Audit dependencies
        run: make deny
