name: zed-en-es-translator-providers

services:
  libretranslate:
    image: ${PROVIDER_IMAGE_REFERENCE:-libretranslate/libretranslate:v1.9.6@sha256:1de2d7056bb8ad607a412f4563d9abe324ff632b43b5be9428bcc8e213aebb32}
    pull_policy: never
    restart: "no"
    environment:
      LT_LOAD_ONLY: en,es
      LT_DISABLE_WEB_UI: "true"
      LT_DISABLE_FILES_TRANSLATION: "true"
      LT_UPDATE_MODELS: "false"
      LT_API_KEYS: "false"
    volumes:
      - ${PROVIDER_SLOT:-current}:/home/libretranslate/.local
    networks:
      - runtime
    healthcheck:
      test: ["CMD", "/app/venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read(1)"]
      interval: 5s
      timeout: 3s
      retries: 24
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G

  loopback:
    image: ${PROVIDER_IMAGE_REFERENCE:-libretranslate/libretranslate:v1.9.6@sha256:1de2d7056bb8ad607a412f4563d9abe324ff632b43b5be9428bcc8e213aebb32}
    pull_policy: never
    restart: "no"
    entrypoint: ["/app/venv/bin/python", "/opt/provider-gateway/loopback_proxy.py"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./loopback_proxy.py:/opt/provider-gateway/loopback_proxy.py:ro
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      libretranslate:
        condition: service_healthy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    networks:
      - runtime
      - edge
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 64

networks:
  runtime:
    name: zed-en-es-translator-providers-runtime
    internal: ${PROVIDER_NETWORK_INTERNAL:-true}
  edge:
    name: zed-en-es-translator-providers-edge
    internal: false

volumes:
  candidate:
    name: zed-en-es-translator-providers-candidate
  current:
    name: zed-en-es-translator-providers-current
  previous:
    name: zed-en-es-translator-providers-previous
